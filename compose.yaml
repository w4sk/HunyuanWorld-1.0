# HunyuanWorld-1.0 local stack.
#
#   docker compose build                 # build the image (slow, one-time)
#   docker compose run --rm app bash     # interactive shell (env already active)
#   docker compose run --rm app \
#       python3 demo_panogen.py --prompt "..." --output_path test_results/foo \
#       --fp8_gemm --fp8_attention       # run a demo directly
#
# HF_TOKEN is read from a local .env file (see .env.example). Required to pull the
# gated FLUX.1-dev / tencent/HunyuanWorld-1 weights on first run.
#
#   docker compose up -d viewer           # serve the web mesh viewer
#   -> open http://localhost:8088/web/viewer.html  (loads test_results/<run>/mesh_layer*.ply)

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: hunyuanworld:local
    gpus: all
    working_dir: /workspace
    shm_size: "8gb"
    stdin_open: true
    tty: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/root/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      # Set to 1 when weights are pre-staged on a shared/NFS cache (avoids
      # network/lock checks — recommended for read-only multi-server prod).
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    volumes:
      # Live repo — edit on host, runs in container.
      - ./:/workspace
      # Model weights (~90GB). HF_CACHE_DIR lets prod point this at an NFS/NAS
      # mount (e.g. /mnt/ai-models/huggingface); defaults to the local HF cache.
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      # ZIM checkpoints. Defaults to the in-repo copy; override to a shared path.
      - ${ZIM_DIR:-./ZIM/zim_vit_l_2092}:/workspace/ZIM/zim_vit_l_2092
    command: bash

  # Static web viewer for generated meshes (Three.js, loads .ply/.drc by URL).
  viewer:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./docker/viewer.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
