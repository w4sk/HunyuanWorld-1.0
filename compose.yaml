# HunyuanWorld-1.0 local stack.
#
#   docker compose build                 # build the image (slow, one-time)
#   docker compose run --rm app bash     # interactive shell (env already active)
#   docker compose run --rm app \
#       python3 demo_panogen.py --prompt "..." --output_path test_results/foo \
#       --fp8_gemm --fp8_attention       # run a demo directly
#
# HF_TOKEN is read from a local .env file (see .env.example). Required to pull the
# gated FLUX.1-dev / tencent/HunyuanWorld-1 weights on first run.
#
#   docker compose up -d viewer           # serve the web mesh viewer
#   -> open http://localhost:8088/web/viewer.html  (loads test_results/<run>/mesh_layer*.ply)

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: hunyuanworld:local
    gpus: all
    working_dir: /workspace
    shm_size: "8gb"
    stdin_open: true
    tty: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/root/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      # Live repo — edit on host, runs in container.
      - ./:/workspace
      # Persist & reuse model weights across runs/rebuilds (FLUX is ~24GB).
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    command: bash

  # Static web viewer for generated meshes (Three.js, loads .ply/.drc by URL).
  viewer:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./docker/viewer.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
