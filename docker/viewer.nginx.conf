server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;

    # Standard MIME map so .png/.jpg display inline in the browser; .ply/.drc
    # (not in the map) fall back to octet-stream, which the loaders read raw.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    # Large meshes (hundreds of MB) — allow ranged requests (default) and no buffering limits.
    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Access-Control-Allow-Origin *;
    }
}
